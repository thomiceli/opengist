name: "Go CI"
on:
  push:
    branches:
      - master
      - 'dev-*'
  workflow_dispatch:

  pull_request:
    paths-ignore:
      - '**.yml'
      - '**.yaml'
      - '**.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go 1.26
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          args: --timeout=20m --disable=errcheck

      - name: Format
        run: make fmt check_changes

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go 1.26
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Check Go modules
        run: make go_mod check_changes

      - name: Check translations
        run: make check-tr

  test-db:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        go: ["1.26"]
        database: [postgres, mysql]
        include:
          - database: postgres
            image: postgres:16
            port: 5432:5432
          - database: mysql
            image: mysql:8
            port: 3306:3306

    runs-on: ${{ matrix.os }}
    services:
      database:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port }}
        env:
          POSTGRES_PASSWORD: opengist
          POSTGRES_DB: opengist_test
          MYSQL_ROOT_PASSWORD: opengist
          MYSQL_DATABASE: opengist_test
        options: >-
          --health-cmd ${{ matrix.database == 'postgres' && 'pg_isready' || '"mysqladmin ping"' }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:latest
        ports:
          - 47700:7700
        env:
          MEILI_NO_ANALYTICS: true
          MEILI_ENV: development
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}

      - name: Run tests
        run: make test TEST_DB_TYPE=${{ matrix.database }}
        env:
          OG_TEST_MEILI_HOST: http://localhost:47700

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macOS-latest"]
        go: ["1.26"]
        database: ["sqlite"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}

      - name: Run tests
        run: make test TEST_DB_TYPE=${{ matrix.database }}

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macOS-latest", "windows-latest"]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go 1.26
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}

      - name: Set up Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Build
        shell: bash
        run: make
