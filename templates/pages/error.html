{{ define "content" }}
<div class="flex flex-col items-center justify-center py-16 text-center">
    <div class="bg-muted text-muted-foreground flex size-16 items-center justify-center rounded-full">
        <svg class="size-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
    </div>

    <p class="text-muted-foreground mt-6 text-sm font-medium">{{ .locale.Tr "error" }} {{ .error.Code }}</p>
    <h1 class="mt-1 text-2xl font-bold leading-tight">{{ httpStatusText .error.Code }}</h1>
    {{ if and (lt .error.Code 500) .error.Message }}
        <p class="text-muted-foreground mt-2 max-w-md text-sm">{{ .error.Message }}</p>
    {{ end }}

    <a href="{{ .c.ExternalUrl }}/" class="btn mt-6">{{ .locale.Tr "error.go-home" }}</a>
</div>
{{ end }}
